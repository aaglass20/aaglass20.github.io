<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fantasy Baseball Tiers — Points League Rankings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --tier1: #1a7a2e;
      --tier2: #2980b9;
      --tier3: #8e44ad;
      --tier4: #7f8c8d;
      --tier5: #d35400;
      --tier6: #95a5a6;
    }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 2.5rem 1rem;
      text-align: center;
      border-bottom: 3px solid #e94560;
    }
    .hero h1 { font-weight: 800; letter-spacing: -0.5px; }
    .hero .subtitle { color: #8b949e; font-size: 1rem; }
    .last-updated { color: #58a6ff; font-size: 0.85rem; margin-top: 0.5rem; }

    /* Nav pills */
    .nav-pills .nav-link {
      color: #8b949e;
      border: 1px solid #30363d;
      margin: 3px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .nav-pills .nav-link:hover { color: #e6edf3; border-color: #58a6ff; }
    .nav-pills .nav-link.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
    .position-icon { font-size: 1.1rem; margin-right: 4px; }

    /* Cards */
    .tier-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .tier-header {
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 1rem;
      border-left: 4px solid;
    }
    .tier-1 .tier-header { border-color: var(--tier1); background: rgba(26,122,46,0.1); color: #3fb950; }
    .tier-2 .tier-header { border-color: var(--tier2); background: rgba(41,128,185,0.1); color: #58a6ff; }
    .tier-3 .tier-header { border-color: var(--tier3); background: rgba(142,68,173,0.1); color: #bc8cff; }
    .tier-4 .tier-header { border-color: var(--tier4); background: rgba(127,140,141,0.1); color: #8b949e; }
    .tier-5 .tier-header { border-color: var(--tier5); background: rgba(211,84,0,0.1); color: #f0883e; }
    .tier-6 .tier-header { border-color: var(--tier6); background: rgba(149,165,166,0.1); color: #8b949e; }

    .player-list { padding: 0.5rem 1rem 0.75rem; }
    .player {
      display: inline-block;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      margin: 3px;
      font-size: 0.88rem;
      transition: all 0.15s;
    }
    .player:hover { border-color: #58a6ff; transform: translateY(-1px); }
    .player.sleeper {
      border-color: #f0883e;
      background: rgba(240,136,62,0.08);
    }
    .player.sleeper::after {
      content: " 🔥";
      font-size: 0.8rem;
    }
    .sleeper-box {
      background: rgba(240,136,62,0.08);
      border: 1px solid #f0883e;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .note-box {
      background: rgba(88,166,255,0.08);
      border: 1px solid #58a6ff;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #58a6ff;
    }
    .back-link {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #58a6ff; }
    footer {
      border-top: 1px solid #30363d;
      padding: 1.5rem 0;
      text-align: center;
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="hero">
    <a href="../index.html" class="back-link">&larr; Back to Glassmation</a>
    <h1>Fantasy Baseball Tiers</h1>
    <p class="subtitle">Points League Rankings — Power, Volume &amp; Quality Starts</p>
    <p class="last-updated" id="lastUpdated"></p>
  </div>

  <div class="container-fluid" style="max-width: 960px;">

    <!-- Position nav -->
    <ul class="nav nav-pills justify-content-center my-3" id="positionTabs" role="tablist">
    </ul>

    <!-- Content -->
    <div class="tab-content" id="positionContent">
    </div>

  </div>

  <footer>
    <div class="container">
      Fantasy Baseball Tiers &mdash; Points League Draft Board<br>
      To update rankings, edit <code>data.json</code> and push.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const TIER_CLASSES = ['tier-1','tier-2','tier-3','tier-4','tier-5','tier-6'];

    async function init() {
      const resp = await fetch('data.json');
      const data = await resp.json();

      document.getElementById('lastUpdated').textContent =
        'Last updated: ' + data.lastUpdated + ' | Format: ' + data.leagueType;

      const tabsEl = document.getElementById('positionTabs');
      const contentEl = document.getElementById('positionContent');
      const positions = Object.entries(data.positions);

      positions.forEach(([key, pos], idx) => {
        // Tab button
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.setAttribute('role', 'presentation');
        li.innerHTML = `<button class="nav-link ${idx === 0 ? 'active' : ''}"
          id="tab-${key}" data-bs-toggle="pill" data-bs-target="#pane-${key}"
          type="button" role="tab" aria-selected="${idx === 0}">
          <span class="position-icon">${pos.icon}</span>${pos.title}
        </button>`;
        tabsEl.appendChild(li);

        // Tab pane
        const pane = document.createElement('div');
        pane.className = `tab-pane fade ${idx === 0 ? 'show active' : ''}`;
        pane.id = `pane-${key}`;
        pane.setAttribute('role', 'tabpanel');

        let html = '';

        if (pos.note) {
          html += `<div class="note-box">${pos.note}</div>`;
        }

        const tiers = Object.entries(pos.tiers);
        tiers.forEach(([tierName, players], tIdx) => {
          const tierClass = TIER_CLASSES[Math.min(tIdx, TIER_CLASSES.length - 1)];
          html += `<div class="tier-card ${tierClass}">
            <div class="tier-header">${tierName}</div>
            <div class="player-list">`;

          players.forEach(p => {
            if (typeof p === 'object') {
              html += `<span class="player sleeper">${p.name}</span>`;
            } else {
              html += `<span class="player">${p}</span>`;
            }
          });

          html += '</div></div>';
        });

        // Sleepers callout
        if (pos.sleepers && pos.sleepers.length > 0) {
          html += '<div class="sleeper-box">🔥 <strong>Sleepers:</strong> ' +
            pos.sleepers.join(', ') + '</div>';
        }

        pane.innerHTML = html;
        contentEl.appendChild(pane);
      });
    }

    init();
  </script>
</body>
</html>
