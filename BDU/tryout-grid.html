<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDU Soccer - 2026 Tryout Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .grid-page { max-width: 100%; padding: 0 0 6rem; }

        /* ---- Trigger bar ---- */
        .trigger-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin: 1rem 0.75rem 0.75rem;
        }
        .btn-select-players {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            background: var(--secondary-color, #1a1a2e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
        }
        .picker-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.18);
            padding: 0.18rem 0.55rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .btn-clear-trigger {
            padding: 0.8rem 1rem;
            background: none;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            color: #e53e3e;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }

        /* ---- Picker bottom sheet ---- */
        .picker-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 500;
            align-items: flex-end;
        }
        .picker-overlay.open { display: flex; }
        .picker-sheet {
            background: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 72vh;
            display: flex;
            flex-direction: column;
        }
        .sheet-handle {
            width: 36px;
            height: 4px;
            background: #cbd5e0;
            border-radius: 2px;
            margin: 0.75rem auto 0;
            flex-shrink: 0;
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.2rem 0.6rem;
            flex-shrink: 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .sheet-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--secondary-color, #1a1a2e);
        }
        .sheet-count {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-left: 0.4rem;
        }
        .btn-sheet-done {
            padding: 0.45rem 1.1rem;
            background: var(--primary-color, #0779e4);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }
        .sheet-body {
            overflow-y: auto;
            padding: 0.8rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom, 0px));
            flex: 1;
        }
        .age-group-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #a0aec0;
            margin: 0.8rem 0 0.35rem;
        }
        .age-group-label:first-child { margin-top: 0; }
        .chips-wrap { display: flex; flex-wrap: wrap; gap: 0.45rem; }
        .chip {
            padding: 0.42rem 0.85rem;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: #f7fafc;
            font-size: 0.88rem;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .chip.selected {
            background: var(--secondary-color, #1a1a2e);
            border-color: var(--secondary-color, #1a1a2e);
            color: white;
        }
        .chip.disabled { opacity: 0.32; cursor: not-allowed; }

        /* ---- Table wrapper (no horizontal scroll) ---- */
        .table-wrap {
            margin: 0 0.75rem;
            overflow-x: hidden;
            overflow-y: auto;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            max-height: calc(100vh - 200px);
            background: white;
        }

        /* table-layout:fixed + width:100% fills the wrapper with no overflow */
        .eval-grid {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
        }

        /* ---- Sticky header row ---- */
        .eval-grid thead th {
            position: sticky;
            top: 0;
            background: var(--secondary-color, #1a1a2e);
            color: white;
            z-index: 10;
            text-align: center;
            padding: 0.65rem 0.2rem;
            font-size: 0.9rem;
            font-weight: 700;
            border-right: 1px solid rgba(255,255,255,0.12);
            overflow: hidden;
        }
        .eval-grid thead th:first-child {
            width: 68px;
            text-align: left;
            padding-left: 0.5rem;
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        /* ---- Attr label column (truncated at 8 chars via CSS) ---- */
        .eval-grid tbody td:first-child {
            width: 68px;
            background: #f7fafc;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4a5568;
            padding: 0 0.3rem 0 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-right: 2px solid #e2e8f0;
            max-width: 68px;
        }

        /* ---- Section divider row ---- */
        .section-row td {
            background: #edf2f7;
            padding: 0.3rem 0.5rem;
            border-top: 2px solid #cbd5e0;
        }
        .section-row td:first-child {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #718096;
        }

        /* ---- Rating cells ---- */
        .r-cell {
            height: 52px;
            text-align: center;
            vertical-align: middle;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .r-cell:active { transform: scale(0.82); }
        .r-val-0 { background: #f7fafc; color: #cbd5e0; }
        .r-val-1 { background: #fc8181; color: white; }
        .r-val-2 { background: #f6ad55; color: white; }
        .r-val-3 { background: #ecc94b; color: #5a3e00; }
        .r-val-4 { background: #68d391; color: #1a4731; }
        .r-val-5 { background: #00ff88; color: #1a1a2e; }

        /* ---- Fixed save bar ---- */
        .save-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 0.85rem 1rem env(safe-area-inset-bottom, 0);
            background: white;
            border-top: 2px solid #e2e8f0;
            display: none;
            z-index: 100;
        }
        .save-bar.visible { display: block; }
        .btn-save-grid {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0779e4 0%, #00ff88 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save-grid:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(7,121,228,0.3); }
        .btn-save-grid:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ---- Status / confirm modal ---- */
        .status-msg {
            margin-top: 0.6rem;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: rgba(0,255,136,0.12);
            border: 1px solid #00cc6a;
            color: #1a4731;
        }
        .status-msg.error {
            display: block;
            background: rgba(252,129,129,0.12);
            border: 1px solid #fc8181;
            color: #742a2a;
        }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white; border-radius: 14px;
            padding: 1.75rem; width: 90%; max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-box h3 { font-size: 1.1rem; color: var(--secondary-color); margin-bottom: 0.75rem; }
        .modal-box p  { color: #4a5568; font-size: 0.92rem; margin-bottom: 1.2rem; line-height: 1.55; }
        .modal-actions { display: flex; gap: 0.7rem; }
        .modal-actions button {
            flex: 1; padding: 0.72rem; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .btn-modal-ok     { background: var(--primary-color, #0779e4); color: white; }
        .btn-modal-cancel { background: #e2e8f0; color: #4a5568; }
    </style>
</head>
<body>

<header>
    <div class="highlight-banner">
        <img src="images/INDEPENDENCE%20BDU_SHIELD_WHITE_small.png" alt="BDU Shield">
        <h1>2026 Tryout Grid</h1>
    </div>
</header>

<div class="waffle-menu-toggle" onclick="toggleWaffleMenu()">
    <span></span><span></span><span></span>
</div>
<div id="waffleMenuContainer"></div>
<div id="planning-menu"></div>
<script>
    fetch('menus/planning-menu.html')
        .then(r => r.text())
        .then(html => {
            document.getElementById('planning-menu').innerHTML = html;
            const page = window.location.pathname.split('/').pop();
            document.querySelectorAll('.menu-item').forEach(el => {
                if (el.getAttribute('href') === page) el.classList.add('active');
            });
        });
</script>

<div class="grid-page">

    <!-- Compact trigger bar -->
    <div class="trigger-bar">
        <button class="btn-select-players" onclick="openPickerModal()">
            <i class="fas fa-users"></i>
            Select Players
            <span class="picker-badge" id="pickerBadge">0 / 5</span>
        </button>
        <button class="btn-clear-trigger" id="clearBtn" onclick="clearAll()">Clear</button>
    </div>

    <!-- Grid table -->
    <div class="table-wrap" id="tableWrap" style="display:none">
        <table class="eval-grid" id="evalGrid"></table>
    </div>

</div>

<!-- Player picker bottom sheet -->
<div class="picker-overlay" id="pickerOverlay" onclick="overlayClick(event)">
    <div class="picker-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <span>
                <span class="sheet-title">Select Players</span>
                <span class="sheet-count" id="sheetCount">0 / 5</span>
            </span>
            <button class="btn-sheet-done" onclick="closePickerModal()">Done</button>
        </div>
        <div class="sheet-body">
            <div id="chipsArea">
                <em style="color:#a0aec0;font-size:0.9rem">Loading players…</em>
            </div>
        </div>
    </div>
</div>

<!-- Fixed save bar -->
<div class="save-bar" id="saveBar">
    <button class="btn-save-grid" id="saveBtn" onclick="openSaveModal()">
        <i class="fas fa-save"></i>&nbsp; Save All Evaluations
    </button>
    <div class="status-msg" id="statusMsg"></div>
</div>

<!-- Save confirmation modal -->
<div class="modal-overlay" id="saveModal">
    <div class="modal-box">
        <h3><i class="fas fa-save"></i>&nbsp; Save Evaluations</h3>
        <p id="saveModalDesc"></p>
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeSaveModal()">Cancel</button>
            <button class="btn-modal-ok" onclick="confirmSave()">Save</button>
        </div>
    </div>
</div>

<div id="shared-footer"></div>
<script>
    fetch('menus/shared-footer.html')
        .then(r => r.text())
        .then(html => { document.getElementById('shared-footer').innerHTML = html; });
</script>
<script src="scripts/scripts.js"></script>

<script>
// ============================================================
//  Supabase
// ============================================================
const SUPABASE_URL = 'https://fpnmnlrwhwnuefbnehuf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NXTAP09deRk87WsP_KdyXg_e1k2Dsih';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
//  Categories (must stay in sync with tryout2026.html)
// ============================================================
const CATS = [
    { label: 'Speed',               key: 'speed' },
    { label: 'Control',             key: 'control' },
    { label: 'Shot Accu.',          key: 'shot_accuracy' },
    { label: 'Touch',               key: 'touch' },
    { label: 'Shot Pwr.',           key: 'shot_power' },
    { label: 'Long Pass',           key: 'long_pass_accuracy' },
    { label: 'Short Pass',          key: 'short_pass_accuracy' },
    { label: 'Hustle',              key: 'hustle' },
    { section: 'Defense' },
    { label: 'Tackling',            key: 'tackling' },
    { label: 'Position.',           key: 'positioning' },
    { label: '1v1',                 key: 'one_v_one' },
    { label: 'Commun.',             key: 'communication' },
    { label: 'Shadow',              key: 'shadow' },
];
const RATING_KEYS = CATS.filter(c => !c.section).map(c => c.key);

// ============================================================
//  State
// ============================================================
let allPlayers = [];
let selected   = [];
let gridData   = {};

// ============================================================
//  Boot
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
    const { data, error } = await db
        .from('tryout2026')
        .select('*')
        .order('age_group')
        .order('name');

    if (error || !data) {
        document.getElementById('chipsArea').innerHTML =
            '<em style="color:#e53e3e">Could not load players. Check connection.</em>';
        return;
    }

    allPlayers = data;
    data.forEach(p => { gridData[p.name] = extractRatings(p); });
    buildChips();
});

function extractRatings(row) {
    const r = {};
    RATING_KEYS.forEach(k => {
        const v = parseInt(row[k]);
        r[k] = (v >= 1 && v <= 5) ? v : 0;
    });
    return r;
}

// ============================================================
//  Initials — first seen gets base, duplicates get base+N
// ============================================================
function buildInitialsMap(names) {
    const seen = {};
    const result = {};
    names.forEach(name => {
        const parts = name.trim().split(/\s+/);
        const first = parts[0] || '';
        const last  = parts[parts.length - 1] || '';
        const base  = (first.slice(0, 2) + last.slice(0, 1)).toUpperCase();
        seen[base] = (seen[base] || 0) + 1;
        result[name] = seen[base] === 1 ? base : base + seen[base];
    });
    return result;
}

// ============================================================
//  Picker modal (bottom sheet)
// ============================================================
function openPickerModal()  { document.getElementById('pickerOverlay').classList.add('open'); }
function closePickerModal() { document.getElementById('pickerOverlay').classList.remove('open'); }
function overlayClick(e) {
    // close when tapping the dark backdrop (not the sheet itself)
    if (e.target === document.getElementById('pickerOverlay')) closePickerModal();
}

// ============================================================
//  Chips
// ============================================================
function buildChips() {
    const area = document.getElementById('chipsArea');
    area.innerHTML = '';
    const full = selected.length >= 5;

    const groups = {};
    allPlayers.forEach(p => {
        const g = p.age_group || 'Other';
        if (!groups[g]) groups[g] = [];
        groups[g].push(p.name);
    });

    Object.keys(groups).sort().forEach(age => {
        const lbl = document.createElement('div');
        lbl.className = 'age-group-label';
        lbl.textContent = age;
        area.appendChild(lbl);

        const wrap = document.createElement('div');
        wrap.className = 'chips-wrap';
        groups[age].forEach(name => {
            const isSel = selected.includes(name);
            const chip  = document.createElement('span');
            chip.className = 'chip' + (isSel ? ' selected' : '') +
                             (!isSel && full ? ' disabled' : '');
            chip.textContent = name;
            chip.onclick = () => togglePlayer(name);
            wrap.appendChild(chip);
        });
        area.appendChild(wrap);
    });

    const countText = `${selected.length} / 5`;
    document.getElementById('pickerBadge').textContent = countText;
    document.getElementById('sheetCount').textContent  = countText;
    document.getElementById('clearBtn').style.display  = selected.length > 0 ? 'block' : 'none';
}

function togglePlayer(name) {
    if (selected.includes(name)) {
        selected = selected.filter(n => n !== name);
    } else {
        if (selected.length >= 5) return;
        selected.push(name);
    }
    buildChips();
    buildGrid();
    hideStatus();
}

function clearAll() {
    selected = [];
    buildChips();
    buildGrid();
    hideStatus();
}

// ============================================================
//  Grid builder
// ============================================================
function buildGrid() {
    const tableWrap = document.getElementById('tableWrap');
    const saveBar   = document.getElementById('saveBar');

    if (selected.length === 0) {
        tableWrap.style.display = 'none';
        saveBar.classList.remove('visible');
        return;
    }

    tableWrap.style.display = 'block';
    saveBar.classList.add('visible');

    const initials = buildInitialsMap(selected);
    let html = '<thead><tr><th></th>';
    selected.forEach(name => {
        html += `<th title="${name}">${initials[name]}</th>`;
    });
    html += '</tr></thead><tbody>';

    CATS.forEach(cat => {
        if (cat.section) {
            html += `<tr class="section-row"><td>${cat.section}</td>`;
            selected.forEach(() => { html += '<td></td>'; });
            html += '</tr>';
            return;
        }

        html += `<tr><td title="${cat.label}">${cat.label}</td>`;
        selected.forEach((name, idx) => {
            const val = gridData[name]?.[cat.key] || 0;
            html += `<td class="r-cell r-val-${val}"
                         onclick="tapRating(${idx},'${cat.key}')">${val || '&ndash;'}</td>`;
        });
        html += '</tr>';
    });

    html += '</tbody>';
    document.getElementById('evalGrid').innerHTML = html;
}

// ============================================================
//  Tap to increment (cycles 1→2→3→4→5→1; unrated → 1)
// ============================================================
function tapRating(playerIdx, key) {
    const name = selected[playerIdx];
    if (!gridData[name]) gridData[name] = {};

    const cur  = gridData[name][key] || 0;
    const next = cur >= 5 ? 1 : cur + 1;
    gridData[name][key] = next;

    const cell = document.querySelector(
        `#evalGrid .r-cell[onclick="tapRating(${playerIdx},'${key}')"]`
    );
    if (cell) {
        cell.className = `r-cell r-val-${next}`;
        cell.textContent = next;
    }

    hideStatus();
}

// ============================================================
//  Save modal
// ============================================================
function openSaveModal() {
    const list  = selected.map(n => `• ${n}`).join('<br>');
    const count = selected.length;
    document.getElementById('saveModalDesc').innerHTML =
        `Save evaluations for <strong>${count} player${count > 1 ? 's' : ''}</strong>?<br><br>${list}`;
    document.getElementById('saveModal').classList.add('open');
}

function closeSaveModal() {
    document.getElementById('saveModal').classList.remove('open');
}

async function confirmSave() {
    closeSaveModal();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp; Saving…';
    hideStatus();

    const rows = selected.map(name => {
        const player = allPlayers.find(p => p.name === name);
        const row = {
            name,
            age_group:  player?.age_group || null,
            updated_at: new Date().toISOString(),
        };
        RATING_KEYS.forEach(k => { row[k] = gridData[name]?.[k] || null; });
        return row;
    });

    const { error } = await db
        .from('tryout2026')
        .upsert(rows, { onConflict: 'name' });

    if (error) {
        showStatus('✗ Save failed: ' + error.message, 'error');
    } else {
        const count = selected.length;
        showStatus(`✓ Saved ${count} player${count > 1 ? 's' : ''}!`, 'success');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i>&nbsp; Save All Evaluations';
}

// ============================================================
//  Status helpers
// ============================================================
function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
}

function hideStatus() {
    const el = document.getElementById('statusMsg');
    el.textContent = '';
    el.className = 'status-msg';
}
</script>

</body>
</html>
