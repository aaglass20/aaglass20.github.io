// 9. CORNHOLE
// ================================================
function chBagSymbol(val) {
    if (val === 3) return '<span class="ch-bag ch-bag-in">3</span>';
    if (val === 1) return '<span class="ch-bag ch-bag-on">1</span>';
    return '<span class="ch-bag ch-bag-miss">0</span>';
}

function chBagSymbolClickable(val, team, idx, prefix) {
    var cls = val === 3 ? 'ch-bag-in' : val === 1 ? 'ch-bag-on' : 'ch-bag-miss';
    return '<span class="ch-bag ' + cls + '" onclick="' + prefix + 'CycleBag(' + team + ',' + idx + ')" title="Click to change">' + val + '</span>';
}

function chCountBags(bags) {
    var ins = 0, ons = 0, misses = 0;
    for (var i = 0; i < bags.length; i++) {
        if (bags[i] === 3) ins++;
        else if (bags[i] === 1) ons++;
        else misses++;
    }
    return { ins: ins, ons: ons, misses: misses, pts: ins * 3 + ons };
}

function renderCornhole() {
    var p1 = state.players[0], p2 = state.players[1];
    var target = state.config.targetScore || 21;
    var exact = state.config.exactScore !== false;
    var bustPenalty = state.config.bustPenalty != null ? state.config.bustPenalty : 15;
    var maxBags = state.config.bagsPerRound || 4;
    var cr = state.currentRound;
    // Migrate old format
    if (!cr.bags1) cr.bags1 = [];
    if (!cr.bags2) cr.bags2 = [];

    var html = '';
    html += '<div class="mode-header"><i class="fas fa-bullseye"></i>';
    html += '<h2>Cornhole</h2>';
    html += '<p>First to ' + target + (exact ? ' (exact)' : '') + '</p></div>';

    // Scoreboard
    html += '<div class="ch-scoreboard">';
    html += '<div class="ch-team ch-team1">';
    html += '<div class="ch-team-name">' + escapeHtml(p1) + '</div>';
    html += '<div class="ch-team-score">' + state.score1 + '</div>';
    html += '</div>';
    html += '<div class="ch-center">';
    html += '<div class="ch-target">' + target + '</div>';
    html += '<div class="ch-round-label">Round ' + (state.rounds.length + 1) + '</div>';
    html += '</div>';
    html += '<div class="ch-team ch-team2">';
    html += '<div class="ch-team-name">' + escapeHtml(p2) + '</div>';
    html += '<div class="ch-team-score">' + state.score2 + '</div>';
    html += '</div>';
    html += '</div>';

    // Winner?
    if (state.completed) {
        html += '<div style="text-align:center;padding:2rem;background:linear-gradient(135deg,#FFF8E1,#FFF3E0);border-radius:var(--radius-lg);border:2px solid var(--accent);margin-bottom:1rem;">';
        html += '<i class="fas fa-trophy" style="font-size:3rem;color:var(--accent);display:block;margin-bottom:0.5rem;"></i>';
        html += '<h2 style="font-size:1.8rem;color:var(--secondary);">' + escapeHtml(state.winner) + ' Wins!</h2>';
        html += '<p style="color:var(--text-medium);">' + state.score1 + ' - ' + state.score2 + '</p>';
        html += '<button class="btn btn-outline mt-2" onclick="cornholeNewGame()"><i class="fas fa-redo"></i> New Game</button>';
        html += '</div>';
    } else {
        var t1Done = cr.bags1.length >= maxBags, t2Done = cr.bags2.length >= maxBags;
        var c1 = chCountBags(cr.bags1), c2 = chCountBags(cr.bags2);

        html += '<div class="ch-throw-area">';

        // Team 1
        html += '<div class="ch-throw-team">';
        html += '<div class="ch-throw-header ch-color1">' + escapeHtml(p1) + '</div>';
        html += '<div class="ch-bag-tray">';
        for (var i = 0; i < cr.bags1.length; i++) html += chBagSymbolClickable(cr.bags1[i], 1, i, 'cornhole');
        for (var j = cr.bags1.length; j < maxBags; j++) html += '<span class="ch-bag ch-bag-empty"></span>';
        html += '</div>';
        html += '<div class="ch-bag-summary">' + c1.pts + ' pts (' + c1.ins + ' in, ' + c1.ons + ' on)</div>';
        html += '<div class="ch-throw-btns">';
        html += '<button class="btn ch-btn-in" onclick="cornholeBag(1,3)"' + (t1Done ? ' disabled' : '') + '><i class="fas fa-circle"></i> In (+3)</button>';
        html += '<button class="btn ch-btn-on" onclick="cornholeBag(1,1)"' + (t1Done ? ' disabled' : '') + '><i class="fas fa-circle-dot"></i> On (+1)</button>';
        html += '<button class="btn ch-btn-miss" onclick="cornholeBag(1,0)"' + (t1Done ? ' disabled' : '') + '><i class="fas fa-xmark"></i> Miss</button>';
        html += '</div>';
        if (cr.bags1.length > 0) html += '<button class="btn btn-outline btn-sm" style="width:100%;margin-top:0.4rem;font-size:0.75rem;" onclick="cornholeUndoBag(1)"><i class="fas fa-undo"></i> Undo Last</button>';
        html += '</div>';

        html += '<div class="ch-vs">VS</div>';

        // Team 2
        html += '<div class="ch-throw-team">';
        html += '<div class="ch-throw-header ch-color2">' + escapeHtml(p2) + '</div>';
        html += '<div class="ch-bag-tray">';
        for (var k = 0; k < cr.bags2.length; k++) html += chBagSymbolClickable(cr.bags2[k], 2, k, 'cornhole');
        for (var l = cr.bags2.length; l < maxBags; l++) html += '<span class="ch-bag ch-bag-empty"></span>';
        html += '</div>';
        html += '<div class="ch-bag-summary">' + c2.pts + ' pts (' + c2.ins + ' in, ' + c2.ons + ' on)</div>';
        html += '<div class="ch-throw-btns">';
        html += '<button class="btn ch-btn-in" onclick="cornholeBag(2,3)"' + (t2Done ? ' disabled' : '') + '><i class="fas fa-circle"></i> In (+3)</button>';
        html += '<button class="btn ch-btn-on" onclick="cornholeBag(2,1)"' + (t2Done ? ' disabled' : '') + '><i class="fas fa-circle-dot"></i> On (+1)</button>';
        html += '<button class="btn ch-btn-miss" onclick="cornholeBag(2,0)"' + (t2Done ? ' disabled' : '') + '><i class="fas fa-xmark"></i> Miss</button>';
        html += '</div>';
        if (cr.bags2.length > 0) html += '<button class="btn btn-outline btn-sm" style="width:100%;margin-top:0.4rem;font-size:0.75rem;" onclick="cornholeUndoBag(2)"><i class="fas fa-undo"></i> Undo Last</button>';
        html += '</div>';

        html += '</div>';

        // Preview & score round
        var diff = c1.pts - c2.pts;
        html += '<div class="ch-score-round">';
        html += '<div class="ch-preview">';
        html += '<span class="ch-preview-team ch-color1">' + escapeHtml(p1) + ': ' + c1.pts + ' raw</span>';
        html += '<span class="ch-preview-diff">Diff: ' + (diff > 0 ? '+' + diff : diff < 0 ? '' + diff : '0') + '</span>';
        html += '<span class="ch-preview-team ch-color2">' + escapeHtml(p2) + ': ' + c2.pts + ' raw</span>';
        html += '</div>';
        html += '<div class="ch-preview-awarded">';
        html += '<span class="ch-color1">' + (diff > 0 ? '+' + diff : '0') + ' awarded</span>';
        html += '<span class="ch-color2">' + (diff < 0 ? '+' + (-diff) : '0') + ' awarded</span>';
        html += '</div>';
        html += '<button class="btn btn-success btn-lg" style="width:100%;margin-top:0.75rem;" onclick="cornholeScoreRound()"><i class="fas fa-check"></i> Score Round</button>';
        html += '</div>';
    }

    // Round history
    if (state.rounds.length > 0) {
        html += '<div class="card" style="margin-top:1rem;">';
        html += '<div class="section-header"><i class="fas fa-history"></i><h2>Round History</h2></div>';
        html += '<div style="overflow-x:auto;"><table class="ch-history-table">';
        html += '<thead><tr>';
        html += '<th>Rnd</th><th class="ch-color1">Bags</th><th class="ch-color1">Pts</th>';
        html += '<th>Diff</th>';
        html += '<th class="ch-color2">Pts</th><th class="ch-color2">Bags</th>';
        html += '<th class="ch-color1">Tot</th><th class="ch-color2">Tot</th>';
        html += '</tr></thead><tbody>';

        var run1 = 0, run2 = 0;
        state.rounds.forEach(function(r, i) {
            var raw1 = r.in1 * 3 + r.on1, raw2 = r.in2 * 3 + r.on2;
            var d = raw1 - raw2;
            var a1 = d > 0 ? d : 0, a2 = d < 0 ? -d : 0;
            var pre1 = run1 + a1, pre2 = run2 + a2;
            var bust = '';
            if (exact && pre1 > target) { pre1 = bustPenalty; bust = 'bust1'; }
            if (exact && pre2 > target) { pre2 = bustPenalty; bust = 'bust2'; }
            run1 = pre1; run2 = pre2;

            // Render bag symbols for history
            var b1html = '', b2html = '';
            if (r.bags1) { for (var bi = 0; bi < r.bags1.length; bi++) b1html += chBagSymbol(r.bags1[bi]); }
            else { for (var x = 0; x < r.in1; x++) b1html += chBagSymbol(3); for (var y = 0; y < r.on1; y++) b1html += chBagSymbol(1); }
            if (r.bags2) { for (var bj = 0; bj < r.bags2.length; bj++) b2html += chBagSymbol(r.bags2[bj]); }
            else { for (var xx = 0; xx < r.in2; xx++) b2html += chBagSymbol(3); for (var yy = 0; yy < r.on2; yy++) b2html += chBagSymbol(1); }

            var rowCls = bust ? ' class="ch-bust-row"' : '';
            html += '<tr' + rowCls + '>';
            html += '<td style="font-weight:700;">' + (i+1) + '</td>';
            html += '<td style="white-space:nowrap;">' + b1html + '</td>';
            html += '<td style="font-weight:700;">' + (a1 || '-') + '</td>';
            var diffColor = d > 0 ? 'var(--primary)' : d < 0 ? 'var(--error)' : 'var(--text-light)';
            html += '<td style="font-weight:900;color:' + diffColor + ';">' + (d > 0 ? '+'+d : d) + '</td>';
            html += '<td style="font-weight:700;">' + (a2 || '-') + '</td>';
            html += '<td style="white-space:nowrap;">' + b2html + '</td>';
            html += '<td style="font-weight:700;">' + run1 + (bust === 'bust1' ? ' <i class="fas fa-explosion" style="color:var(--warning);font-size:0.7rem;"></i>' : '') + '</td>';
            html += '<td style="font-weight:700;">' + run2 + (bust === 'bust2' ? ' <i class="fas fa-explosion" style="color:var(--warning);font-size:0.7rem;"></i>' : '') + '</td>';
            html += '</tr>';
        });

        html += '</tbody></table></div></div>';
    }

    return html;
}

function cornholeBag(team, val) {
    if (state.completed) return;
    var cr = state.currentRound;
    if (!cr.bags1) cr.bags1 = [];
    if (!cr.bags2) cr.bags2 = [];
    var maxBags = state.config.bagsPerRound || 4;
    var bags = team === 1 ? cr.bags1 : cr.bags2;
    if (bags.length >= maxBags) { showStatus('All bags thrown!', 'error'); return; }
    bags.push(val);
    saveState();
    renderPlay();
}

function cornholeUndoBag(team) {
    var cr = state.currentRound;
    var bags = team === 1 ? cr.bags1 : cr.bags2;
    if (bags.length > 0) bags.pop();
    saveState();
    renderPlay();
}

function cornholeCycleBag(team, idx) {
    var cr = state.currentRound;
    var bags = team === 1 ? cr.bags1 : cr.bags2;
    if (idx >= bags.length) return;
    // Cycle: 3 → 1 → 0 → 3
    var cur = bags[idx];
    bags[idx] = cur === 3 ? 1 : cur === 1 ? 0 : 3;
    saveState();
    renderPlay();
}

function cornholeScoreRound() {
    var cr = state.currentRound;
    if (!cr.bags1) cr.bags1 = [];
    if (!cr.bags2) cr.bags2 = [];
    var target = state.config.targetScore || 21;
    var exact = state.config.exactScore !== false;
    var bustPenalty = state.config.bustPenalty != null ? state.config.bustPenalty : 15;

    var c1 = chCountBags(cr.bags1), c2 = chCountBags(cr.bags2);
    var diff = c1.pts - c2.pts;
    var awarded1 = diff > 0 ? diff : 0;
    var awarded2 = diff < 0 ? -diff : 0;

    var newScore1 = state.score1 + awarded1;
    var newScore2 = state.score2 + awarded2;

    var busted = null;
    if (exact && newScore1 > target) { newScore1 = bustPenalty; busted = state.players[0]; }
    if (exact && newScore2 > target) { newScore2 = bustPenalty; busted = state.players[1]; }

    state.score1 = newScore1;
    state.score2 = newScore2;
    state.rounds.push({ in1: c1.ins, on1: c1.ons, in2: c2.ins, on2: c2.ons, bags1: cr.bags1.slice(), bags2: cr.bags2.slice() });

    state.matches.push({
        round: state.rounds.length,
        in1: c1.ins, on1: c1.ons, in2: c2.ins, on2: c2.ons,
        awarded1: awarded1, awarded2: awarded2,
        score1: state.score1, score2: state.score2,
        busted: busted,
        timestamp: new Date().toISOString()
    });

    if (busted) showStatus(busted + ' BUSTED! Score reset to ' + bustPenalty, 'error');

    var winner = null;
    if (exact) {
        if (state.score1 === target) winner = state.players[0];
        else if (state.score2 === target) winner = state.players[1];
    } else {
        if (state.score1 >= target) winner = state.players[0];
        else if (state.score2 >= target) winner = state.players[1];
    }

    if (winner) {
        state.completed = true;
        state.winner = winner;
        showStatus(winner + ' wins!', 'success');
    }

    state.currentRound = { bags1: [], bags2: [] };
    saveState();
    renderPlay();
}

function cornholeNewGame() {
    if (!confirm('Start a new cornhole game? Current scores will be saved to history.')) return;
    state.score1 = 0;
    state.score2 = 0;
    state.rounds = [];
    state.currentRound = { bags1: [], bags2: [] };
    state.completed = false;
    state.winner = null;
    saveState();
    renderPlay();
    showStatus('New game started!', 'success');
}

// ================================================
// HISTORY TAB
// ================================================
function renderHistory() {
    var el = document.getElementById('historyView');
    if (!state || state.matches.length === 0) {
        el.innerHTML = '<div class="empty-state"><i class="fas fa-clock-rotate-left"></i><h3>No matches yet</h3><p>Play some games to see your match history here.</p></div>';
        return;
    }

    var html = '<div class="card">';
    html += '<div class="section-header"><i class="fas fa-clock-rotate-left"></i><h2>Match History</h2></div>';
    html += '<div style="overflow-x:auto;"><table class="swiss-standings"><thead><tr>';
    html += '<th>#</th>';

    switch (state.mode) {
        case 'bestof':
            html += '<th>Players</th><th>Score</th><th>Winner</th><th>Time</th>';
            break;
        case 'koth':
            html += '<th>King</th><th>Challenger</th><th>Winner</th><th>Time</th>';
            break;
        case 'swiss':
            html += '<th>Round</th><th>Players</th><th>Winner</th><th>Time</th>';
            break;
        case 'firstto':
            html += '<th>Winner</th><th>Time</th>';
            break;
        case 'accumulation':
            html += '<th>Players</th><th>Result</th><th>Time</th>';
            break;
        case 'lives':
            html += '<th>Players</th><th>Winner</th><th>Time</th>';
            break;
        case 'gauntlet':
            html += '<th>Opponent</th><th>Result</th><th>Time</th>';
            break;
        case 'pushluck':
            html += '<th>Player</th><th>Action</th><th>Turn Pts</th><th>Total</th><th>Time</th>';
            break;
        case 'cornhole':
            html += '<th>Rnd</th><th>' + escapeHtml(state.players[0]) + '</th><th>' + escapeHtml(state.players[1]) + '</th><th>Diff</th><th>Score</th><th>Time</th>';
            break;
    }

    html += '</tr></thead><tbody>';

    // Show matches in reverse order (newest first)
    var matches = state.matches.slice().reverse();
    matches.forEach(function(m, idx) {
        var num = state.matches.length - idx;
        html += '<tr><td>' + num + '</td>';

        switch (state.mode) {
            case 'bestof':
                html += '<td>' + escapeHtml(m.p1) + ' vs ' + escapeHtml(m.p2) + '</td>';
                html += '<td>' + (m.score1 !== undefined ? m.score1 + '-' + m.score2 : '-') + '</td>';
                html += '<td style="font-weight:600;color:var(--success);">' + escapeHtml(m.winner) + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'koth':
                html += '<td>' + escapeHtml(m.king) + '</td>';
                html += '<td>' + escapeHtml(m.challenger) + '</td>';
                html += '<td style="font-weight:600;color:var(--success);">' + escapeHtml(m.winner) + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'swiss':
                html += '<td>R' + m.round + '</td>';
                html += '<td>' + escapeHtml(m.p1) + ' vs ' + escapeHtml(m.p2) + '</td>';
                html += '<td style="font-weight:600;color:var(--success);">' + escapeHtml(m.winner) + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'firstto':
                html += '<td style="font-weight:600;color:var(--success);">' + escapeHtml(m.winner) + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'accumulation':
                html += '<td>' + escapeHtml(m.p1) + ' vs ' + escapeHtml(m.p2) + '</td>';
                var resLabel = m.result === 'draw' ? 'Draw' : escapeHtml(m.winner) + ' wins';
                html += '<td style="font-weight:600;color:var(--success);">' + resLabel + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'lives':
                html += '<td>' + escapeHtml(m.p1) + ' vs ' + escapeHtml(m.p2) + '</td>';
                html += '<td style="font-weight:600;color:var(--success);">' + escapeHtml(m.winner) + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'gauntlet':
                html += '<td>' + escapeHtml(m.opponent) + '</td>';
                html += '<td style="font-weight:600;color:' + (m.result === 'win' ? 'var(--success)' : 'var(--error)') + ';">' + (m.result === 'win' ? 'Win' : 'Loss') + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'pushluck':
                var actionColor = m.action === 'bank' ? 'var(--success)' : m.action === 'bust' ? 'var(--error)' : 'var(--info)';
                var actionLabel = m.action === 'bank' ? 'Bank' : m.action === 'bust' ? 'Bust' : 'Fix';
                var actionIcon = m.action === 'bank' ? 'fa-piggy-bank' : m.action === 'bust' ? 'fa-skull-crossbones' : 'fa-wrench';
                html += '<td>' + escapeHtml(m.player) + '</td>';
                html += '<td style="font-weight:600;color:' + actionColor + ';"><i class="fas ' + actionIcon + '"></i> ' + actionLabel + '</td>';
                html += '<td>' + (m.action === 'bust' ? '-' + m.turnScore : (m.action === 'bank' ? '+' + m.turnScore : '-')) + '</td>';
                html += '<td style="font-weight:600;">' + m.totalScore + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
            case 'cornhole':
                var cRaw1 = m.in1 * 3 + m.on1, cRaw2 = m.in2 * 3 + m.on2;
                var cDiff = cRaw1 - cRaw2;
                html += '<td>' + m.round + '</td>';
                html += '<td>' + m.in1 + 'in/' + m.on1 + 'on (' + cRaw1 + ')</td>';
                html += '<td>' + m.in2 + 'in/' + m.on2 + 'on (' + cRaw2 + ')</td>';
                html += '<td style="font-weight:700;color:' + (cDiff > 0 ? 'var(--primary)' : cDiff < 0 ? 'var(--error)' : 'var(--text-light)') + ';">' + (cDiff > 0 ? '+' + cDiff : cDiff) + (m.busted ? ' <i class="fas fa-explosion" style="color:var(--warning);"></i>' : '') + '</td>';
                html += '<td style="font-weight:600;">' + m.score1 + '-' + m.score2 + '</td>';
                html += '<td style="color:var(--text-light);font-size:0.8rem;">' + formatTimestamp(m.timestamp) + '</td>';
                break;
        }

        html += '</tr>';
    });

    html += '</tbody></table></div></div>';
    el.innerHTML = html;
}

// ================================================
// SETTINGS TAB
// ================================================
function renderSettings() {
    var el = document.getElementById('settingsView');
    if (!state) {
        el.innerHTML = '<div class="empty-state"><i class="fas fa-cog"></i><h3>No active session</h3></div>';
        return;
    }

    var modeInfo = MODES[state.mode] || {};
    var html = '<div class="card">';
    html += '<div class="section-header"><i class="fas fa-info-circle"></i><h2>Session Info</h2></div>';
    html += '<div style="display:grid;gap:0.5rem;font-size:0.9rem;">';
    html += '<div><strong>Mode:</strong> ' + (modeInfo.label || state.mode) + '</div>';
    html += '<div><strong>Players:</strong> ' + state.players.map(escapeHtml).join(', ') + '</div>';
    html += '<div><strong>Matches Played:</strong> ' + state.matches.length + '</div>';
    html += '<div><strong>Status:</strong> ' + (state.completed ? '<span style="color:var(--success);">Completed</span>' : '<span style="color:var(--primary);">Active</span>') + '</div>';
    if (state.winner) html += '<div><strong>Winner:</strong> <span style="color:var(--accent-dark);font-weight:700;">' + escapeHtml(state.winner) + '</span></div>';
    html += '<div><strong>Created:</strong> ' + formatTime(state.createdAt) + '</div>';
    html += '<div><strong>Last Updated:</strong> ' + formatTime(state.updatedAt) + '</div>';

    // Mode-specific info
    switch (state.mode) {
        case 'bestof':
            html += '<div><strong>Series Length:</strong> Best of ' + state.config.seriesLength + '</div>';
            html += '<div><strong>Score:</strong> ' + state.p1Wins + ' - ' + state.p2Wins + '</div>';
            break;
        case 'koth':
            html += '<div><strong>Current King:</strong> ' + escapeHtml(state.currentKing) + '</div>';
            html += '<div><strong>Current Streak:</strong> ' + state.currentStreak + '</div>';
            html += '<div><strong>End Condition:</strong> ' + state.config.endCondition + '</div>';
            break;
        case 'swiss':
            html += '<div><strong>Rounds:</strong> ' + Math.min(state.currentRound, state.config.totalRounds) + ' / ' + state.config.totalRounds + '</div>';
            break;
        case 'firstto':
            html += '<div><strong>Target:</strong> ' + state.config.target + ' wins</div>';
            break;
        case 'lives':
            html += '<div><strong>Starting Lives:</strong> ' + state.config.startingLives + '</div>';
            html += '<div><strong>Eliminated:</strong> ' + state.eliminated.length + ' / ' + state.players.length + '</div>';
            break;
        case 'gauntlet':
            html += '<div><strong>Gauntlet Player:</strong> ' + escapeHtml(state.gauntletPlayer) + '</div>';
            html += '<div><strong>Record:</strong> ' + state.gWins + 'W - ' + state.gLosses + 'L</div>';
            break;
        case 'pushluck':
            html += '<div><strong>Target Score:</strong> ' + (state.config.targetScore || 100) + ' points</div>';
            var sorted = state.players.slice().sort(function(a, b) { return state.scores[b] - state.scores[a]; });
            html += '<div><strong>Leader:</strong> ' + escapeHtml(sorted[0]) + ' (' + state.scores[sorted[0]] + ' pts)</div>';
            html += '<div><strong>Final Round:</strong> ' + (state.finalRound ? 'Yes' : 'No') + '</div>';
            break;
        case 'cornhole':
            html += '<div><strong>Target Score:</strong> ' + (state.config.targetScore || 21) + ' points</div>';
            html += '<div><strong>Scoring:</strong> ' + (state.config.exactScore !== false ? 'Exact (bust penalty: ' + (state.config.bustPenalty != null ? state.config.bustPenalty : 15) + ')' : 'Go Over OK') + '</div>';
            html += '<div><strong>Bags Per Round:</strong> ' + (state.config.bagsPerRound || 4) + '</div>';
            html += '<div><strong>Score:</strong> ' + state.score1 + ' - ' + state.score2 + '</div>';
            html += '<div><strong>Rounds Played:</strong> ' + state.rounds.length + '</div>';
            break;
    }

    html += '</div></div>';

    // Actions
    html += '<div class="card">';
    html += '<div class="section-header"><i class="fas fa-wrench"></i><h2>Actions</h2></div>';
    html += '<div style="display:flex;flex-direction:column;gap:0.75rem;">';
    html += '<button class="btn btn-outline" onclick="exportSession()"><i class="fas fa-download"></i> Export JSON</button>';
    html += '<button class="btn btn-outline" style="color:var(--warning);border-color:var(--warning);" onclick="resetSession()"><i class="fas fa-undo"></i> Reset Data</button>';
    html += '<button class="btn btn-danger" onclick="deleteSession()"><i class="fas fa-trash"></i> Delete Session</button>';
    html += '</div></div>';

    el.innerHTML = html;
}

function exportSession() {
    if (!state) return;
    var dataStr = JSON.stringify(state, null, 2);
    var blob = new Blob([dataStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'h2h_' + state.mode + '_' + projectId + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showStatus('Session exported', 'success');
}

function resetSession() {
    if (!state) return;
    if (!confirm('Reset all match data for this session? This cannot be undone.')) return;
    var mode = state.mode;
    var players = state.players.slice();
    var config = JSON.parse(JSON.stringify(state.config));
    state = buildInitialState(mode, players, config);
    saveState();
    renderPlay();
    showStatus('Session data reset', 'success');
}

function deleteSession() {
    if (!confirm('Delete this entire session? This cannot be undone.')) return;
    localStorage.removeItem(LS_KEY);
    // Remove from project index
    try {
        var idx = JSON.parse(localStorage.getItem('mybracketly_projects_index') || '[]');
        idx = idx.filter(function(p) { return p.id !== projectId; });
        localStorage.setItem('mybracketly_projects_index', JSON.stringify(idx));
    } catch(e) {}
    // Also remove legacy key if present
    localStorage.removeItem('mybracketly_headtohead_' + projectId);
    window.location.href = 'index.html';
}

// ---- Start ----
init();
</script>
